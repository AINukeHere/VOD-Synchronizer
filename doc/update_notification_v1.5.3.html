<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업데이트 알림</title>
    <link rel="stylesheet" href="update_notification_common.css">
</head>
<body>
    <div class="update-container">
        <div class="version-number" id="versionNumber">v1.5.3 주요 변경사항</div>
        <ul class="changes-list" id="changesList">
            <li>
                <strong>타임라인 편집기</strong>
                <ul class="bug-fix-list" style="margin-top: 8px; margin-bottom: 8px;">
                    <li>쉬프트를 누른 채로 미세조정 시 10초씩 증감됩니다.</li>
                </ul>
                <div class="preview-images-row" style="display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;">
                    <img src="screenshots/timeline_editor_shiftKey.png" alt="타임라인 편집기 쉬프트 키" class="preview-image" onclick="openImageModal(this.src)" style="flex: 1; min-width: 0; max-width: 50%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                </div>
            </li>
            <li>
                <strong>새 기능: 현재 시간 삽입</strong>
                <ul class="bug-fix-list" style="margin-top: 8px; margin-bottom: 8px;">
                    <li>VOD 댓글 작성 및 수정 시 VOD의 현재 시점을 댓글 내용에 타임라인 형식으로 삽입합니다.</li>
                </ul>
                <div class="preview-images-row" style="display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;">
                    <img src="screenshots/insertCurrentTime_demo.gif" alt="현재 시간 삽입 데모" class="preview-image" onclick="openImageModal(this.src)" style="flex: 1; min-width: 0; max-width: 50%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                </div>
            </li>
        </ul>
        <p style="margin-top: 16px; font-size: 14px; color: #555;">처음 설치하셨나요? 어떤 기능이 있는지 <a href="https://ainukehere.github.io/VOD-Synchronizer/doc/" target="_blank" rel="noopener noreferrer">알아보세요</a>.</p>
    </div>

    <!-- 이미지 모달 -->
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="확대 이미지">
    </div>

    <script src="update_notification_common.js"></script>
</body>
</html>
